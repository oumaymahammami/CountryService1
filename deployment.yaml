apiVersion: apps/v1
kind: Deployment
metadata:
  name: country-service
  namespace: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: country-service
  template:
    metadata:
      labels:
        app: country-service
    spec:
      containers:
      - name: country-service
        image: jamina2385/my-country-service:v1
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
